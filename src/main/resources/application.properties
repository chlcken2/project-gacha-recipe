spring.application.name=dailytable

spring.main.allow-bean-definition-overriding=true

server.port=8089

# MySQL
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.url=jdbc:mysql://localhost:3306/jsl26db?serverTimezone=UTC
spring.datasource.username=jsl26
spring.datasource.password=1234

# MyBatis
mybatis.mapper-locations=classpath:mapper/**/*.xml
mybatis.type-aliases-package=com.dailytable.dailytable.domain
mybatis.configuration.map-underscore-to-camel-case=true

# File upload
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=20MB
spring.servlet.multipart.enabled=true

# Thymeleaf
spring.thymeleaf.cache=false

# Encoding
spring.http.encoding.charset=utf-8
spring.http.encoding.enabled=true
spring.http.encoding.force=true

# Messages
spring.messages.basename=messages
spring.messages.encoding=utf-8
spring.messages.cache-duration=3600

# Gemini AI
gemini.api.key=AIzaSyDJHiQ41WaNNsOSaxImzbxqXIeOlUKZPjU
gemini.api.model=gemini-2.0-flash

# pollinations ai
pollinations.api.key=sk_z6jo2aH6EdlK8lxI6fbPQjdsvo3ISa4A

# SQL init
spring.sql.init.mode=always
spring.sql.init.schema-locations=classpath:schema.sql
spring.sql.init.data-locations=classpath:data.sql
spring.sql.init.continue-on-error=true
